name: Test and Deploy

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Write .env to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /home/${{ secrets.SSH_USER }}/apps/fishing-report-http-server/.env << 'EOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MYSQL_HOST=${{ secrets.MYSQL_HOST }}
            MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            AWS_BUCKET=${{ secrets.AWS_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            EOF

      - name: Copy build and package files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/,package.json,package-lock.json
          target: /home/${{ secrets.SSH_USER }}/apps/fishing-report-http-server/

      - name: Install production dependencies and restart pm2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/apps/fishing-report-http-server
            /home/${{ secrets.SSH_USER }}/.nvm/versions/node/v20.20.2/bin/npm ci --omit=dev
            set -a && source .env && set +a
            /home/${{ secrets.SSH_USER }}/.nvm/versions/node/v20.20.2/bin/pm2 delete fishing_report || true
            /home/${{ secrets.SSH_USER }}/.nvm/versions/node/v20.20.2/bin/pm2 start dist/index.js --name fishing_report
            /home/${{ secrets.SSH_USER }}/.nvm/versions/node/v20.20.2/bin/pm2 save
