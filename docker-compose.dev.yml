services:
  migrate:
    build: .
    env_file: .env.docker
    command: node dist/scripts/migrate.js

  app:
    build: .
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - "3000:3000"
    command: node dist/index.js
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./drizzle:/app/drizzle

  worker:
    build: .
    restart: unless-stopped
    env_file: .env.docker
    command: node dist/workers/usgs.worker.js
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./drizzle:/app/drizzle

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
